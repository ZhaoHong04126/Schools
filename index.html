<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>大學神隊友</title>
    
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/landing.css">
    <style>
        /* 新增：左側核心功能亮點區塊的樣式 */
        .feature-highlights {
            margin-top: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 400px;
        }
        .feature-item {
            display: flex;
            align-items: center;
            gap: 15px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 15px 20px;
            border-radius: 16px;
            transition: transform 0.3s ease, background 0.3s ease;
        }
        .feature-item:hover { transform: translateX(10px); background: rgba(255, 255, 255, 0.25); }
        .feature-icon { font-size: 1.8rem; }
        .feature-text strong {
            display: block;
            font-size: 1.05rem;
            margin-bottom: 4px;
        }
        .feature-text small { font-size: 0.85rem; opacity: 0.85; }
    </style>
</head>
<body>
    <div class="split-layout" id="landing-page" style="opacity: 0; transition: opacity 0.3s;">
        <div class="mobile-header">
            <div class="brand-logo">
                <img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png" width="28" height="28" alt="Logo">
                大學神隊友
            </div>
            <button class="btn-login-trigger" onclick="openLoginModal()">登 入</button>
        </div>
        <div class="left-panel">
            <div class="brand-logo desktop-logo">
                <img src="https://cdn-icons-png.flaticon.com/512/2921/2921222.png" width="32" height="32" alt="Logo">
                大學神隊友
            </div>
            <div class="hero-text">
                <h1>你的專屬校園導航系統</h1>
                <p class="hero-subtitle" style="font-size: 1.15rem; margin-top: 15px; font-weight: 500;">你的課表、社團、校園生活，一站搞定</p>
            </div>
            <div class="feature-highlights">
                <div class="feature-item">
                    <span class="feature-icon">🛡️</span>
                    <div class="feature-text">
                        <strong>選課避雷指南</strong>
                        <small>學長姐真實評價，輕鬆避開雷課拿高分</small>
                    </div>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">📅</span>
                    <div class="feature-text">
                        <strong>學生活動行事曆</strong>
                        <small>校園大小事與社團活動，一手掌握不錯過</small>
                    </div>
                </div>
                <div class="feature-item">
                    <span class="feature-icon">💰</span>
                    <div class="feature-text">
                        <strong>學生專屬記帳</strong>
                        <small>輕鬆管理生活費與各項開銷，月底不再吃土</small>
                    </div>
                </div>
            </div>
            <div style="position: absolute; bottom: 20px; left: 0; width: 100%; text-align: center; font-size: 0.85rem; opacity: 0.6; pointer-events: none;">
                &copy; 2026 大學神隊友 All rights reserved.
            </div>
        </div>
        <div class="right-panel">
            <div class="login-wrapper">
                <button class="btn-close-modal" onclick="closeLoginModal()">✖</button>
                <h2>你的神隊友已上線</h2>
                <p class="subtitle">一鍵登入，全面掌握你的校園生活</p>
                <div class="primary-actions">
                    <button class="btn-massive btn-google-massive" onclick="loginWithGoogle()">
                        <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" width="24">
                        使用 Google 一鍵登入
                    </button>
                    <button class="btn-massive btn-guest-massive" onclick="loginAnonymously()">
                        👻 免裝備新手試用體驗
                    </button>
                </div>
                <div class="divider">或使用 Email 登入</div>
                <div class="secondary-login">
                    <div class="input-group">
                        <input type="email" id="email" placeholder="電子信箱">
                    </div>
                    <div class="input-group" style="margin-bottom: 10px;">
                        <input type="password" id="password" placeholder="密碼 (至少6位數)">
                    </div>
                    <div class="login-options">
                        <label style="display:flex; align-items:center; cursor:pointer;">
                            <input type="checkbox" id="chk-remember" style="margin-right: 8px; width:16px; height:16px; accent-color: var(--primary);" checked> 保持登入
                        </label>
                        <a onclick="forgotPassword()" style="cursor: pointer;">忘記密碼？</a>
                    </div>
                    <button class="btn-main-outline" onclick="handleLogin()" id="btn-submit">信箱登入</button>
                </div>
                <div class="toggle-mode">
                    <span id="toggle-text" style="color: var(--text-muted); font-weight: normal;">還不是校園王？</span>
                    <span onclick="registerAccount()" id="toggle-btn" style="cursor: pointer;">立即加入行列</span>
                </div>
            </div>
        </div>
    </div>
    
    <script src="js/supabase.js"></script>
    <script>
        // 1. 檢查目前是否已經登入 (取代 auth.onAuthStateChanged 的初始檢查)
        supabase.auth.getSession().then(({ data: { session } }) => {
            if (session) {
                window.location.href = 'app.html';
            } else {
                document.getElementById('landing-page').style.opacity = '1';
            }
        });

        // 2. 監聽登入狀態改變
        supabase.auth.onAuthStateChange((event, session) => {
            if (event === 'SIGNED_IN' && session) {
                window.location.href = 'app.html';
            }
        });

        // 信箱密碼登入
        async function handleLogin() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            if (!email || !password) {
                alert("請輸入 Email 和密碼");
                return;
            }

            const { data, error } = await supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) alert("登入失敗：" + error.message);
        }

        // 註冊新帳號
        async function registerAccount() {
            const email = prompt("請輸入要註冊的 Email 信箱：");
            if (email) {
                const password = prompt("請設定密碼 (至少6個字元)：");
                if (password) {
                    const { data, error } = await supabase.auth.signUp({
                        email: email,
                        password: password,
                    });

                    if (error) {
                        alert("註冊失敗：" + error.message);
                    } else {
                        // Supabase 預設需要 Email 驗證，如果有開啟驗證功能，需提醒使用者收信
                        alert("🎉 註冊成功！如果系統有要求信箱驗證，請先去收信。否則將自動登入。");
                    }
                }
            }
        }

        // Google 登入
        async function loginWithGoogle() { 
            const { data, error } = await supabase.auth.signInWithOAuth({ 
                provider: 'google',
                options: {
                    // 設定登入成功後要跳轉回哪個頁面
                    redirectTo: window.location.origin + window.location.pathname.replace('index.html', '') + 'app.html'
                }
            });
            if (error) alert("Google 登入錯誤：" + error.message);
        }

        // 匿名登入 (要在 Supabase 後台 Auth -> Providers 開啟 Anonymous 功能)
        async function loginAnonymously() { 
            const { data, error } = await supabase.auth.signInAnonymously();
            if (error) alert("匿名登入錯誤：" + error.message);
        }

        // 忘記密碼
        async function forgotPassword() {
            const email = document.getElementById('email').value;
            if (!email) {
                alert("請先在上方輸入您的 Email 信箱，系統才能寄送重設信給您！");
                return;
            }
            if (confirm(`確定要寄送重設密碼信件至 ${email} 嗎？`)) {
                const { data, error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + window.location.pathname,
                });

                if (error) {
                    alert("發送失敗：" + error.message);
                } else {
                    alert("📧 重設信已寄出！請檢查信箱。");
                }
            }
        }

        // UI Modal 控制
        function openLoginModal() {
            document.querySelector('.right-panel').classList.add('show-modal');
        }

        function closeLoginModal() {
            document.querySelector('.right-panel').classList.remove('show-modal');
        }
    </script>
</body>
</html>
